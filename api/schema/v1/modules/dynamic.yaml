parameters:
  id:
    name: id
    in: path
    description: Unique resource identifier
    type: string
    format: string
    required: true

paths:
  /dynamic-results/thresholds:
    get:
      operationId: ThresholdList
      tags:
        - DynamicResults
        - Threshold
      summary: List thresholds
      description: The endpoint returns all of the configured thresholds
      responses:
        200:
          description: Success
          schema:
            type: array
            items:
              $ref: "#/definitions/ThresholdConfig"
    post:
      operationId: CreateThreshold
      tags:
        - DynamicResults
        - Threshold
      summary: Create a threshold
      description: Create a new threshold
      parameters:
        - name: threshold
          in: body
          description: Threshold configuration
          required: true
          schema:
            $ref: "#/definitions/ThresholdConfig"
      responses:
        201:
          description: Created
          headers:
            Location:
              description: URI of created threshold
          schema:
            $ref: "#/definitions/ThresholdConfig"

  /dynamic-results/thresholds/{id}:
    get:
      operationId: GetThreshold
      tags:
        - DynamicResults
        - Threshold
      summary: Returns the threshold
      description: Returns the threshold configuration by ID
      parameters:
        - $ref: "#/parameters/id"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/ThresholdConfig"
    delete:
      operationId: DeleteThreshold
      tags:
        - DynamicResults
        - Threshold
      summary: Delete the threshold
      description: Delete the threshold by ID
      parameters:
        - $ref: "#/parameters/id"
      responses:
        204:
          description: No Content

  /dynamic-results/thresholds/{id}/result:
    get:
      operationId: GetThresholdResult
      tags:
        - DynamicResults
        - Threshold
      summary: Get the threshold result
      description: Get the threshold result by threshold ID
      parameters:
        - $ref: "#/parameters/id"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/ThresholdResult"

  /dynamic-results/t-digests:
    get:
      operationId: TDigestList
      tags:
        - DynamicResults
        - T-Digest
      summary: List T-Digests
      description: The endpoint returns all of configured T-Digests
      responses:
        200:
          description: Success
          schema:
            type: array
            items:
              $ref: "#/definitions/TDigestConfig"
    post:
      operationId: CreateTDigest
      tags:
        - DynamicResults
        - T-Digest
      summary: Create T-Digest
      description: Create a new T-Digest
      parameters:
        - name: tdigest
          in: body
          description: T-Digest configuration
          required: true
          schema:
            $ref: "#/definitions/TDigestConfig"
      responses:
        201:
          description: Created
          headers:
            Location:
              description: URI of created T-Digest
          schema:
            $ref: "#/definitions/TDigestConfig"

  /dynamic-results/t-digests/{id}:
    get:
      operationId: GetTDigest
      tags:
        - DynamicResults
        - T-Digest
      summary: Returns the T-Digest
      description: Returns the T-Digest configuration by ID
      parameters:
        - $ref: "#/parameters/id"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/TDigestConfig"
    delete:
      operationId: DeleteTDigest
      tags:
        - DynamicResults
        - T-Digest
      summary: Delete the T-Digest
      description: Delete the T-Digest by ID
      parameters:
        - $ref: "#/parameters/id"
      responses:
        204:
          description: No Content

  /dynamic-results/t-digests/{id}/result:
    get:
      operationId: GetTDigestResult
      tags:
        - DynamicResults
        - T-Digest
      summary: Returns the T-Digest result
      description: Returns the T-Digest result by T-Digest ID
      parameters:
        - $ref: "#/parameters/id"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/TDigestResult"

definitions:
  ThresholdConfig:
    type: object
    description: Threshold value
    properties:
      id:
        type: string
        description: Unique threshold identifier
      generator_id:
        type: string
        description: Unique generator identifier
      value:
        type: float
        description: The value of interest
      function:
        type: string
        description: The function to apply to the statistic before evaluating
        enum:
          - dx
          - dxdt
          - dxdy
      condition:
        type: string
        description: The mathematical relation between value and statistic
        enum:
          - greater
          - greater_or_equal
          - less
          - less_or_equal
          - equal
      stat_x:
        type: string
        description: The X statistic to track
      stat_y:
        type: string
        description: The Y statistic to track (when using DXDY function)
    required:
      - id
      - generator_id
      - value
      - function
      - condition
      - stat_x

  ThresholdResult:
    type: object
    description: Threshold result
    properties:
      id:
        type: string
        description: Threshold unique identifier
      generator_id:
        type: string
        description: Generator unique identifier
      timestamp:
        type: string
        description: The ISO8601-formatted date of the last result update
        format: date-time
      value:
        type: float
        description: The value of interest
      condition:
        type: string
        description: The mathematical relation between value and statistic
        enum:
          - greater
          - greater_or_equal
          - less
          - less_or_equal
          - equal
      condition_true:
        type: integer
        description: Counter of true conditions
      condition_false:
        type: integer
        description: Counter of false conditions
    required:
      - id
      - generator_id
      - timestamp
      - value
      - condition
      - condition_true
      - condition_false

  TDigestConfig:
    type: object
    description: T-Digest value
    properties:
      id:
        type: string
        description: T-Digest unique identifier
      generator_id:
        type: string
        description: Unique generator identifier
      function:
        type: string
        description: The function to apply to the statistic before evaluating
        enum:
          - dx
          - dxdt
          - dxdy
      stat_x:
        type: string
        description: The X statistic to track
      stat_y:
        type: string
        description: The Y statistic to track (when using DXDY function)
    required:
      - id
      - generator_id
      - function
      - stat_x

  TDigestResult:
    type: object
    description: T-Digest result
    properties:
      id:
        type: string
        description: T-Digest identifier
      generator_id:
        type: string
        description: Unique generator identifier
      timestamp:
        type: string
        description: The ISO8601-formatted date of the last result update
        format: date-time
      delta:
        type: float
        description: The delta value used to initialize the T-Digest struct
      factor:
        type: integer
        description: The compression factor used to initialize the T-Digest struct
      centroids:
        type: array
        description: Array of centroids
        items:
          $ref: "#/definitions/TDigestCentroid"
    required:
      - id
      - generator_id
      - timestamp
      - delta
      - factor
      - centroids

  TDigestCentroid:
    type: object
    description: The data point inside the T-Digest structure
    properties:
      mean:
        type: float
        description: The average value of this centroid
      weight:
        type: integer
        description: The weight of this centroid
    required:
      - mean
      - weight
