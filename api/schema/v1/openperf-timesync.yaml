swagger: "2.0"

info:
  title: OpenPerf TimeSync API
  description: REST API interface for OpenPerf Time Synchronization
  termsOfService: TODO
  contact:
    name: "Spirent, Inc."
    url: "http://spirent.com"
    email: "support@spirent.com"
  license:
    name: "Apache License 2.0"
    url: "https://github.com/Spirent/openperf/blob/master/LICENSE"
  version: "1"

schemes:
  - http
  - https

host: localhost

produces:
  - application/json

consumes:
  - application/json

parameters:
  id:
    name: id
    in: path
    description: Unique resource identifier
    type: string
    format: string
    required: true

tags:
  - name: TimeCounters
  - name: TimeKeeper
  - name: TimeSources

basePath: /

paths:
  /time-counters:
    get:
      operationId: ListTimeCounters
      tags:
        - TimeCounters
      summary: List time counters
      description: |
        The `time-counters` endpoint returns all local time counters
        that are available for measuring the passage of time.  This
        list is for informational purposes only.
      responses:
        200:
          description: Success
          schema:
            type: array
            items:
              $ref: "#/definitions/TimeCounter"

  /time-counters/{id}:
    get:
      operationId: GetTimeCounter
      tags:
        - TimeCounters
      summary: Get a time counter
      description: Returns a time counter, by id.
      parameters:
        - $ref: "#/parameters/id"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/TimeCounter"

  /time-keeper:
    get:
      operationId: GetTimeKeeper
      tags:
        - TimeKeeper
      summary: Get a time keeper.
      description: Returns the system time keeper, aka clock.
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/TimeKeeper"

  /time-sources:
    get:
      operationId: ListTimeSources
      tags:
        - TimeSources
      summary: List reference clocks
      description: |
        The `time-sources` endpoint returns all network clock sources
        that are used for syncing the local time.
      responses:
        200:
          description: Success
          schema:
            type: array
            items:
              $ref: "#/definitions/TimeSource"
    post:
      operationId: CreateTimeSource
      tags:
        - TimeSources
      summary: Register a time source for time syncing.
      description: Registers a new time source for time syncing.
      parameters:
        - name: timesource
          in: body
          description: New time source
          required: true
          schema:
            $ref: "#/definitions/TimeSource"
      responses:
        201:
          description: Success
          schema:
            $ref: "#/definitions/TimeSource"

  /time-sources/{id}:
    get:
      operationId: GetTimeSource
      tags:
        - TimeSources
      summary: Get a time source
      description: Get a time source, by id.
      parameters:
        - $ref: "#/parameters/id"
      responses:
        200:
          description: Success
          schema:
            $ref: "#/definitions/TimeSource"
    delete:
      operationId: DeleteTimeSource
      tags:
        - TimeSources
      summary: Delete a time source
      description: Deletes an existing time source. Idempotent.
      parameters:
        - $ref: "#/parameters/id"
      responses:
        204:
          description: No Content

definitions:
  TimeCounter:
    type: object
    description: A source of clock ticks
    properties:
      id:
        type: string
        description: Unique time counter identifier
      name:
        type: string
        description: Time counter name
      frequency:
        type: integer
        description: Tick rate of the counter, in Hz.
        format: int64
      quality:
        type: integer
        description: Relative value of counter accuracy
        format: int32
    required:
      - id
      - name
      - frequency
      - quality

  TimeKeeper:
    type: object
    description: |
      A combination of a TimeSource and a TimeCounter used to measure
      the passage of time, aka a clock.
    properties:
      time:
        type: string
        description: The current time and date
        format: date-time
      time_counter_id:
        type: string
        description: Time counter used for measuring time intervals
      time_source_id:
        type: string
        description: Time source used for wall-clock synchronization
      synced:
        type: boolean
        description: Indicates if clock has synced to source or not
    required:
      - time
      - time_counter_id
      - time_source_id
      - synced

  TimeSourceConfig:
    type: object
    description: time source configuration
    properties:
      ntp:
        type: object
        description: Network Time Protocol Server
        properties:
          hostname:
            type: string
            description: network hostname or address for server
          port:
            type: integer
            default: 123
            description: server port
            format: int32
        required:
          hostname

  TimeSourceStats:
    type: object
    description: time source statistics
    properties:
      ntp:
        type: object
        description: NTP statistics
        properties:
          rx_packets:
            type: integer
            description: Received packets
            format: int64
          tx_packets:
            type: integer
            description: Transmitted packets
            format: int64
        required:
          - rx_packets
          - tx_packets

  TimeSource:
    type: object
    description: A reference time source
    properties:
      id:
        type: string
        description: Unique time source identifier
      kind:
        type: string
        description: time source kind
        enum:
          - ntp
      config:
        $ref: "#/definitions/TimeSourceConfig"
      stats:
        $ref: "#/definitions/TimeSourceStats"
    required:
      - id
      - kind
      - config
      - stats
