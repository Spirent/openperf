---
services:
  default:
    # NOTE: --force-unlink will NOT verify if another copy of inception is running.
    # FIXME: Remove --force-unlink. This is a hacky, temporary workaround for reliability.
    command: 'common/launcher.sh ../../build/stack-linux-x86_64-testing/bin/inception --dpdk-test-mode --log-level debug --force-unlink --dpdk="-m256m,--no-huge" -p 9000 > inception.log 2>&1'
    base_url: http://127.0.0.1:9000
    init_url: http://127.0.0.1:9000/version
    init_timeout: 15s

shims:
  default:
    path: ../../build/libicp-shim-linux-x86_64-testing/lib/libicp-shim.so
    trace: 1

helpers:
  nc-ipv4-tcp-lstnr:
    command: 'nc -4 -l {address} 9999'
  nc-ipv4-tcp-wrtr:
    command: 'nc -4 {address} 9999'
  nc-ipv4-udp-lstnr:
    command: 'nc -u -4 -l {address} 9999'
  nc-ipv4-udp-wrtr:
    command: 'nc -u -4 {address} 9999'
